<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Super Mario Bros - Recreación fiel del clásico de 1985 en JavaScript">
    <title>Super Mario Bros</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-wrapper">
        <div id="hud">
            <div class="hud-item">
                <span class="hud-label">MARIO</span>
                <span id="hud-score" class="hud-value">000000</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">COINS</span>
                <span id="hud-coins" class="hud-value">×00</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">WORLD</span>
                <span id="hud-world" class="hud-value">1-1</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">TIME</span>
                <span id="hud-time" class="hud-value">400</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">LIVES</span>
                <span id="hud-lives" class="hud-value">×03</span>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="mobile-controls">
            <div id="dpad">
                <button id="btn-up" class="dpad-btn" aria-label="Up">▲</button>
                <div class="dpad-row">
                    <button id="btn-left" class="dpad-btn" aria-label="Left">◀</button>
                    <button id="btn-down" class="dpad-btn" aria-label="Down">▼</button>
                    <button id="btn-right" class="dpad-btn" aria-label="Right">▶</button>
                </div>
            </div>
            <div id="action-btns">
                <button id="btn-b" class="action-btn" aria-label="Run/Fire">B</button>
                <button id="btn-a" class="action-btn" aria-label="Jump">A</button>
            </div>
        </div>
    </div>

    <div id="title-screen">
        <div class="title-content">
            <h1 class="game-title">SUPER<br>MARIO BROS.</h1>
            <p class="copyright">©1985 NINTENDO</p>
            <p class="blink-text">PRESS ENTER TO START</p>
            <div class="menu-options">
                <p class="menu-item active" id="menu-1player"><span class="menu-cursor">🍄</span> 1 PLAYER GAME</p>
                <div class="level-selector">
                    <label>START AT: </label>
                    <select id="world-select">
                        <option value="1-1">1-1</option>
                        <option value="1-2">1-2</option>
                        <option value="1-3">1-3</option>
                        <option value="1-4">1-4</option>
                    </select>
                </div>
                <p class="controls-hint">Arrow Keys / WASD to move<br>Space / Z to jump | X to run / shoot fire</p>
            </div>
        </div>
    </div>

    <script src="js/config.js?v=2"></script>
    <script src="js/sprites.js?v=2"></script>
    <script src="js/audio.js?v=2"></script>
    <script src="js/input.js?v=2"></script>
    <script src="js/levels.js?v=2"></script>
    <script src="js/entities.js?v=2"></script>
    <script src="js/renderer.js?v=2"></script>
    <script src="js/game.js?v=2"></script>
</body>
</html>
